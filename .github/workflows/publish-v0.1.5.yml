name: Publish v0.1.5

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: "${{ github.event_name == 'workflow_dispatch' || github.event.head_commit.message == 'ci: publish v0.1.5 release' }}"
    runs-on: windows-latest

    steps:
      - name: Checkout v0.1.5
        uses: actions/checkout@v4
        with:
          ref: v0.1.5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m venv .venv-win
          .\.venv-win\Scripts\python.exe -m pip install --upgrade pip
          .\.venv-win\Scripts\python.exe -m pip install -r requirements.txt
          .\.venv-win\Scripts\python.exe -m pip install pyinstaller==6.11.1

      - name: Validate Python sources
        shell: powershell
        run: |
          .\.venv-win\Scripts\python.exe -m py_compile main.py overlay.py translator.py audio_capture.py speech_recognition.py mobile_server.py qr_widget.py
          .\.venv-win\Scripts\python.exe -m unittest discover -s tests

      - name: Build lite and full portable packages
        shell: powershell
        run: |
          .\scripts\build_portable.ps1 -Version "0.1.5"

      - name: Write release notes
        id: notes
        shell: powershell
        run: |
          $lite = "release\GameVoiceTranslator-v0.1.5-lite.zip"
          $full = "release\GameVoiceTranslator-v0.1.5-full.zip"
          $liteHash = (Get-FileHash $lite -Algorithm SHA256).Hash.ToLowerInvariant()
          $fullHash = (Get-FileHash $full -Algorithm SHA256).Hash.ToLowerInvariant()
          $liteSize = [math]::Round((Get-Item $lite).Length / 1MB, 1)
          $fullSize = [math]::Round((Get-Item $full).Length / 1MB, 1)
          @"
          ## Game Voice Translator v0.1.5

          - Added ModelScope as the default lite-package Whisper model source for mainland China users.
          - Kept official Hugging Face and custom Hugging Face Endpoint options for users who need them.
          - Added visible model download progress, download-source diagnostics, and ModelScope file handling.
          - Added lite and full portable packages: lite downloads the model on first run, full includes Whisper small.

          ### Downloads

          - ``GameVoiceTranslator-v0.1.5-lite.zip``: $liteSize MB
            - SHA256: ``$liteHash``
          - ``GameVoiceTranslator-v0.1.5-full.zip``: $fullSize MB
            - SHA256: ``$fullHash``

          Mainland China users should start with the lite package's default ``ModelScope 国内源`` or use the full package.
          "@ | Set-Content -Encoding UTF8 release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.5
          name: Game Voice Translator v0.1.5
          body_path: release-notes.md
          files: |
            release/GameVoiceTranslator-v0.1.5-lite.zip
            release/GameVoiceTranslator-v0.1.5-full.zip
          fail_on_unmatched_files: true
          make_latest: true
          overwrite_files: true
