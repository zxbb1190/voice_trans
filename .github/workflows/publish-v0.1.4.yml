name: Publish v0.1.4

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.head_commit.message == 'ci: publish v0.1.4 release'
    runs-on: windows-latest

    steps:
      - name: Checkout v0.1.4
        uses: actions/checkout@v4
        with:
          ref: v0.1.4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m venv .venv-win
          .\.venv-win\Scripts\python.exe -m pip install --upgrade pip
          .\.venv-win\Scripts\python.exe -m pip install -r requirements.txt
          .\.venv-win\Scripts\python.exe -m pip install pyinstaller==6.11.1 onnxruntime==1.23.2

      - name: Prepare Whisper model cache
        shell: powershell
        run: |
          .\.venv-win\Scripts\python.exe -c "from faster_whisper import WhisperModel; WhisperModel('small', device='cpu', compute_type='int8', download_root='.models')"

      - name: Validate Python sources
        shell: powershell
        run: |
          .\.venv-win\Scripts\python.exe -m py_compile main.py overlay.py translator.py audio_capture.py speech_recognition.py mobile_server.py qr_widget.py test_google_translation.py

      - name: Build portable app
        shell: powershell
        run: |
          .\.venv-win\Scripts\pyinstaller.exe --clean --noconfirm game_voice_translator.spec
          New-Item -ItemType Directory -Force release | Out-Null
          Remove-Item -Recurse -Force release\GameVoiceTranslator-v0.1.4-portable -ErrorAction SilentlyContinue
          Remove-Item -Force release\GameVoiceTranslator-v0.1.4-portable.zip -ErrorAction SilentlyContinue
          Copy-Item -Recurse dist\GameVoiceTranslator release\GameVoiceTranslator-v0.1.4-portable
          Compress-Archive -Path release\GameVoiceTranslator-v0.1.4-portable -DestinationPath release\GameVoiceTranslator-v0.1.4-portable.zip -CompressionLevel Optimal

      - name: Write release notes
        id: notes
        shell: powershell
        run: |
          $zip = "release\GameVoiceTranslator-v0.1.4-portable.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $size = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          @"
          ## Game Voice Translator v0.1.4

          - Added automatic wrapping for overlay subtitles so text is not elided or hidden in narrow windows.
          - Added a scrollable translation area for very small overlay sizes.
          - Included the latest translation provider/configuration updates from main.

          Portable package: ``GameVoiceTranslator-v0.1.4-portable.zip``

          SHA256: ``$hash``
          Size: $size MB
          "@ | Set-Content -Encoding UTF8 release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.4
          name: Game Voice Translator v0.1.4
          body_path: release-notes.md
          files: release/GameVoiceTranslator-v0.1.4-portable.zip
          fail_on_unmatched_files: true
          make_latest: true
          overwrite_files: true
